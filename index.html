<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniCord</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="auth-view" id="authView">
      <section class="auth-panel">
        <div>
          <p class="eyebrow">MiniCord</p>
          <h1 id="authTitle">Welcome back</h1>
        </div>

        <form class="auth-form" id="authForm">
          <label>
            <span>Email</span>
            <input id="emailInput" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Password</span>
            <input id="passwordInput" type="password" autocomplete="current-password" minlength="6" required />
          </label>
          <label id="usernameField" hidden>
            <span>Username</span>
            <input id="usernameInput" autocomplete="username" maxlength="24" />
          </label>
          <p class="error-text" id="authError"></p>
          <button type="submit" id="authSubmit">Sign in</button>
          <button class="link-button" type="button" id="authToggle">Need an account? Sign up</button>
        </form>
      </section>
    </main>

    <div class="app-shell" id="appView" hidden>
      <aside class="sidebar">
        <div class="me-card">
          <div class="avatar big">M</div>
          <div>
            <strong id="meName">User</strong>
            <small id="meEmail"></small>
          </div>
          <button id="signOutButton">Sign out</button>
        </div>

        <form class="add-friend" id="friendForm">
          <input id="friendInput" placeholder="friend username or email" required />
          <button type="submit">Add</button>
        </form>

        <section class="side-section">
          <div class="section-head">
            <p class="section-label">Friends</p>
          </div>
          <div class="stack-list" id="friendList"></div>
        </section>

        <section class="side-section grow">
          <div class="section-head">
            <p class="section-label">Chats</p>
            <button class="small-button" id="groupButton" type="button">Group</button>
          </div>
          <div class="stack-list" id="chatList"></div>
        </section>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Chat</p>
            <h1 id="chatTitle">Choose a chat</h1>
            <p id="chatSubtitle">Add a friend or create a group to begin.</p>
          </div>
          <div class="voice-tools">
            <span id="callStatus">Not in voice</span>
            <button id="callButton" type="button">Voice call</button>
          </div>
        </header>

        <section class="messages" id="messages"></section>

        <form class="composer" id="messageForm">
          <input id="messageInput" autocomplete="off" maxlength="1000" placeholder="Write a message" />
          <button type="submit">Send</button>
        </form>
      </main>
    </div>

    <dialog id="groupDialog">
      <form method="dialog" class="dialog-body" id="groupForm">
        <h2>Create group</h2>
        <input id="groupNameInput" maxlength="32" placeholder="group name" />
        <div class="check-list" id="groupFriends"></div>
        <div class="dialog-actions">
          <button value="cancel" class="secondary-button">Cancel</button>
          <button value="default">Create</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
